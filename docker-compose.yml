# Sentinel AI — Docker Compose
# One-command deployment for the Prime compliance gate agent.

services:
  sentinel-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./audit.log:/app/audit.log
      - ./policies:/app/policies:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - POLICY_FILE=policies/hipaa.json
      - AUDIT_LOG_PATH=audit.log
      - LOG_LEVEL=INFO
      - AGENT_NAME=Prime
      - PROJECT_NAME=Sentinel AI
